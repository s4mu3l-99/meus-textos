<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Textos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            font-weight: bold;
        }

        .texto-box {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
            text-align: left;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .texto-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-color: #667eea;
        }

        .texto-box h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .texto-content {
            background: white;
            padding: 20px;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            word-break: break-all;
            border-left: 5px solid #667eea;
        }

        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            background: #5a67d8;
            transform: scale(1.05);
        }

        .copied {
            background: #48bb78 !important;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Meus Textos</h1>
        
        <div class="texto-box" onclick="copyText(1)">
            <h2>Texto 1</h2>
            <div class="texto-content" id="texto1">ultim347@gmail.com</div>
            <button class="copy-btn" onclick="copyText(1, event)">Copiar</button>
        </div>

        <div class="texto-box" onclick="copyText(2)">
            <h2>Texto 2</h2>
            <div class="texto-content" id="texto2">asucar67</div>
            <button class="copy-btn" onclick="copyText(2, event)">Copiar</button>
        </div>
    </div>

    <script>
        function copyText(id, event) {
            event?.stopPropagation();
            
            const texto = document.getElementById(`texto${id}`).textContent;
            navigator.clipboard.writeText(texto).then(() => {
                const btn = event?.target;
                if (btn) {
                    btn.textContent = 'Copiado! ✅';
                    btn.classList.add('copied');
                    setTimeout(() => {
                        btn.textContent = 'Copiar';
                        btn.classList.remove('copied');
                    }, 2000);
                }
                
                // Feedback visual
                showToast(`Texto ${id} copiado!`);
            });
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #48bb78;
                color: white;
                padding: 15px 25px;
                border-radius: 10px;
                font-weight: bold;
                z-index: 1000;
                animation: slideIn 0.3s ease;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // Adiciona keyframes para animação
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
